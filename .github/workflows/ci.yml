name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and KAT (windows-x86_64)
    # The networking layer (src/net.zig) currently targets Windows (Winsock).
    # Linux/Android builds need the POSIX socket backend; until then CI runs on
    # Windows, which is the platform the release binary targets.
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Install Zig 0.14.1 directly (the project's minimum_zig_version). Done with a
      # plain run step rather than a setup action so CI carries no deprecated-Node
      # action runtime. Checksum-verified against the official release.
      - name: Install Zig 0.14.1
        shell: pwsh
        run: |
          $ver = "0.14.1"
          $url = "https://ziglang.org/download/$ver/zig-x86_64-windows-$ver.zip"
          $sha = "554f5378228923ffd558eac35e21af020c73789d87afeabf4bfd16f2e6feed2c"
          Invoke-WebRequest -Uri $url -OutFile zig.zip
          $got = (Get-FileHash zig.zip -Algorithm SHA256).Hash
          if ($got -ne $sha.ToUpper()) { throw "Zig checksum mismatch: $got" }
          Expand-Archive -Path zig.zip -DestinationPath "$env:RUNNER_TEMP\zig" -Force
          "$env:RUNNER_TEMP\zig\zig-x86_64-windows-$ver" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # ReleaseFast + native CPU is the canonical build. The SHA-NI inline asm is
      # comptime-gated on the target's +sha feature, so this compiles on any
      # x86-64 runner (with or without SHA-NI) -- the hash path simply falls back
      # to std.crypto when the feature is absent.
      - name: Build (ReleaseFast, native CPU)
        run: zig build -Doptimize=ReleaseFast -Dcpu=native

      # --selftest runs the pow("a") known-answer test and exits 0 on PASS / 1 on
      # FAIL, validating the hash end-to-end (whichever SHA path the runner uses).
      - name: Self-test (pow(a) KAT)
        run: .\zig-out\bin\zig-miner.exe --selftest
