name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Windows, os: windows-latest }
          - { name: Linux, os: ubuntu-latest }
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-zig
      # ReleaseFast + native CPU. The SHA-NI asm is comptime-gated on +sha, so this
      # compiles on any x86-64 runner and the hash falls back to std.crypto when the
      # runner lacks SHA-NI -- the KAT validates correctness either way.
      - name: Build (ReleaseFast, native)
        run: zig build -Doptimize=ReleaseFast -Dcpu=native
      - name: Self-test (pow(a) KAT)
        shell: bash
        run: |
          BIN=zig-out/bin/zig-miner
          [ -f "$BIN.exe" ] && BIN="$BIN.exe"
          "$BIN" --selftest

  arm64-emulated:
    name: Build and KAT (linux-aarch64, emulated)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-zig
      # Cross-build a fully-static aarch64 musl binary and run its KAT under
      # qemu-user (no SHA-NI on ARM -> portable std.crypto path; KAT still validates).
      - name: Cross-build aarch64 (static) + KAT under QEMU
        run: |
          zig build -Doptimize=ReleaseFast -Dtarget=aarch64-linux-musl -p out-arm64
          sudo apt-get update -qq && sudo apt-get install -y -qq qemu-user-static
          qemu-aarch64-static ./out-arm64/bin/zig-miner --selftest

  hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-zig
      - name: zig fmt --check
        run: zig fmt --check src build.zig
